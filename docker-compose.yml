version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: antigravity-postgres
    environment:
      POSTGRES_DB: antigravityboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: antigravity-board
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: antigravityboard
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-in-production-use-at-least-32-characters
    ports:
      - "8080:8080"

volumes:
  postgres_data:
